# Web:S6850 ("Headings must have content...") fires on every <h1>/<h2>/<h3>
# whose text is populated at runtime by scripts/site.js from
# content/<lang>.json via data-i18n attributes. Static analysis cannot
# reason about the runtime i18n step, so the rule is a false positive
# for this project. Disabled across the whole repo.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=Web:S6850
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*
