<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="al-Kindi is a design and technology studio building brands, products, and digital experiences.">
  <meta property="og:title" content="al-Kindi — Design &amp; Technology Studio">
  <meta property="og:description" content="A design and technology studio focused on clear thinking and solid work.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.alkindi.com/">
  <meta property="og:image" content="https://www.alkindi.com/assets/images/upscale.webp">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="theme-color" content="#060504">
  <link rel="canonical" href="https://www.alkindi.com/">
  <title>al-Kindi — Design &amp; Technology Studio</title>
  <link rel="icon" href="assets/logos/alkindi.svg" type="image/svg+xml">
  <link rel="preload" href="content/en.json" as="fetch" type="application/json" crossorigin>
  <link rel="stylesheet" href="styles/fonts.css">
  <link rel="stylesheet" href="styles/main.css">
  <noscript><link rel="stylesheet" href="styles/noscript.css"></noscript>
</head>
<body>

  <noscript><div class="noscript-message">JavaScript is required to view this site. — Bu siteyi görüntülemek için JavaScript gerekiyor.</div></noscript>

  <header class="site-header">
    <a href="/" class="nav__logo"><img src="assets/logos/alkindi.svg" alt="al-Kindi" class="nav__logo-img"></a>
    <fieldset class="lang-switch">
      <legend class="visually-hidden" data-i18n="lang.switch"></legend>
      <button type="button" class="lang-switch__item lang-switch__item--active" data-lang="en" aria-pressed="true">EN</button>
      <button type="button" class="lang-switch__item" data-lang="tr" aria-pressed="false">TR</button>
    </fieldset>
    <nav class="nav" data-i18n-aria="nav.main">
      <ul class="nav__links">
        <li><a href="#work" class="nav__link"><span class="nav__arrow">→</span><span data-i18n="nav.work"></span></a></li>
        <li><a href="#services" class="nav__link"><span class="nav__arrow">→</span><span data-i18n="nav.services"></span></a></li>
        <li><a href="#about" class="nav__link"><span class="nav__arrow">→</span><span data-i18n="nav.about"></span></a></li>
        <li><a href="#team" class="nav__link"><span class="nav__arrow">→</span><span data-i18n="nav.team"></span></a></li>
        <li><a href="#contact" class="nav__link"><span class="nav__arrow">→</span><span data-i18n="nav.contact"></span></a></li>
      </ul>
    </nav>
  </header>

  <section id="hero" class="hero">
    <div class="container hero__content">
      <h1 class="hero__heading" data-i18n-aria="hero.headingAria">
        <span class="hero__phrase" data-i18n="hero.phrase1"></span>
        <span class="hero__phrase" data-i18n="hero.phrase2"></span>
      </h1>
      <div class="hero__foot">
        <p class="hero__tagline" data-i18n="hero.tagline"></p>
        <p class="hero__body" data-i18n="hero.body"></p>
      </div>
    </div>
  </section>

  <main>

    <section id="work" class="work">
      <div class="container">
        <div class="work__head reveal">
          <h2 class="section__label" data-i18n="work.label"></h2>
          <span class="work__viewall" data-i18n="work.viewAll"></span>
        </div>
      </div>
      <div class="work__grid">

        <div class="work__col work__col--left">
          <article class="project-item reveal reveal-delay-1">
            <div class="project-item__image">
              <div class="project-item__placeholder project-item__placeholder--nexora"></div>
            </div>
            <div class="project-item__info">
              <h3 class="project-item__title" data-i18n="work.nexora.title"></h3>
              <p class="project-item__tags" data-i18n="work.nexora.tags"></p>
            </div>
          </article>
          <article class="project-item reveal reveal-delay-3">
            <div class="project-item__image">
              <div class="project-item__placeholder project-item__placeholder--kove"></div>
            </div>
            <div class="project-item__info">
              <h3 class="project-item__title" data-i18n="work.kove.title"></h3>
              <p class="project-item__tags" data-i18n="work.kove.tags"></p>
            </div>
          </article>
        </div>

        <div class="work__col work__col--right">
          <article class="project-item reveal reveal-delay-2">
            <div class="project-item__image">
              <div class="project-item__placeholder project-item__placeholder--solari"></div>
            </div>
            <div class="project-item__info">
              <h3 class="project-item__title" data-i18n="work.solari.title"></h3>
              <p class="project-item__tags" data-i18n="work.solari.tags"></p>
            </div>
          </article>
          <article class="project-item reveal reveal-delay-4">
            <div class="project-item__image">
              <div class="project-item__placeholder project-item__placeholder--ashen"></div>
            </div>
            <div class="project-item__info">
              <h3 class="project-item__title" data-i18n="work.ashen.title"></h3>
              <p class="project-item__tags" data-i18n="work.ashen.tags"></p>
            </div>
          </article>
        </div>

      </div>
    </section>

    <section id="services" class="section-gap" data-color="light">
      <div class="container">
        <div class="services__top reveal">
          <h2 class="section__label" data-i18n="services.label"></h2>
          <p class="services__lead" data-i18n="services.lead"></p>
        </div>
        <ul class="service-list">

          <li class="service-item reveal reveal-delay-1">
            <span class="service-item__index">01</span>
            <h3 class="service-item__title" data-i18n="services.01.title"></h3>
            <p class="service-item__desc" data-i18n="services.01.desc"></p>
          </li>

          <li class="service-item reveal reveal-delay-2">
            <span class="service-item__index">02</span>
            <h3 class="service-item__title" data-i18n="services.02.title"></h3>
            <p class="service-item__desc" data-i18n="services.02.desc"></p>
          </li>

          <li class="service-item reveal reveal-delay-3">
            <span class="service-item__index">03</span>
            <h3 class="service-item__title" data-i18n="services.03.title"></h3>
            <p class="service-item__desc" data-i18n="services.03.desc"></p>
          </li>

          <li class="service-item reveal reveal-delay-4">
            <span class="service-item__index">04</span>
            <h3 class="service-item__title" data-i18n="services.04.title"></h3>
            <p class="service-item__desc" data-i18n="services.04.desc"></p>
          </li>

          <li class="service-item reveal reveal-delay-5">
            <span class="service-item__index">05</span>
            <h3 class="service-item__title" data-i18n="services.05.title"></h3>
            <p class="service-item__desc" data-i18n="services.05.desc"></p>
          </li>

          <li class="service-item reveal reveal-delay-6">
            <span class="service-item__index">06</span>
            <h3 class="service-item__title" data-i18n="services.06.title"></h3>
            <p class="service-item__desc" data-i18n="services.06.desc"></p>
          </li>

          <li class="service-item reveal reveal-delay-7">
            <span class="service-item__index">07</span>
            <h3 class="service-item__title" data-i18n="services.07.title"></h3>
            <p class="service-item__desc" data-i18n="services.07.desc"></p>
          </li>

          <li class="service-item reveal reveal-delay-8">
            <span class="service-item__index">08</span>
            <h3 class="service-item__title" data-i18n="services.08.title"></h3>
            <p class="service-item__desc" data-i18n="services.08.desc"></p>
          </li>

        </ul>
      </div>
    </section>

    <section id="about" class="section-gap about" data-color="light">
      <div class="container">
        <h2 class="section__label reveal" data-i18n="about.label"></h2>
        <div class="about__layout">
          <p class="about__lead reveal reveal-delay-1" data-i18n="about.lead"></p>
          <div class="about__body reveal reveal-delay-2">
            <p data-i18n="about.body1"></p>
            <p data-i18n="about.body2"></p>
          </div>
        </div>
      </div>
    </section>

    <section id="team" class="team section-gap">
      <div class="container">
        <h2 class="section__label" data-i18n="team.label"></h2>
        <h2 class="team__intro"><span data-i18n="team.intro1"></span><br><span data-i18n="team.intro2"></span></h2>
      </div>
      <div class="team__list">

        <article class="team__member">
          <div class="team__photo-wrap">
            <div class="team__photo">
              <div class="team__photo-placeholder team__photo-placeholder--munevver"></div>
            </div>
            <button class="team__toggle" aria-expanded="false" aria-controls="bio-munevver" aria-label="Show Münevver Aslan bio">
              <span class="team__toggle-icon">+</span>
            </button>
          </div>
          <div class="team__info">
            <span class="team__role" data-i18n="team.munevver.role"></span>
            <h3 class="team__name" data-i18n="team.munevver.name"></h3>
            <div id="bio-munevver" class="team__bio-wrap">
              <div class="team__bio-inner">
                <p class="team__bio" data-i18n="team.munevver.bio"></p>
              </div>
            </div>
          </div>
        </article>

        <article class="team__member">
          <div class="team__photo-wrap">
            <div class="team__photo">
              <div class="team__photo-placeholder team__photo-placeholder--partner"></div>
            </div>
            <button class="team__toggle" aria-expanded="false" aria-controls="bio-partner" aria-label="Show Studio Partner bio">
              <span class="team__toggle-icon">+</span>
            </button>
          </div>
          <div class="team__info">
            <span class="team__role" data-i18n="team.partner.role"></span>
            <h3 class="team__name" data-i18n="team.partner.name"></h3>
            <div id="bio-partner" class="team__bio-wrap">
              <div class="team__bio-inner">
                <p class="team__bio" data-i18n="team.partner.bio"></p>
              </div>
            </div>
          </div>
        </article>

      </div>
    </section>

    <section id="contact" class="section-gap contact">
      <div class="container">
        <h2 class="section__label reveal" data-i18n="contact.label"></h2>
        <h2 class="contact__heading reveal reveal-delay-1" data-i18n="contact.heading"></h2>
        <p class="contact__sub reveal reveal-delay-2" data-i18n="contact.sub"></p>
        <div class="contact__links reveal reveal-delay-3">
          <a href="mailto:info@alkindi.com" class="contact__link">info@alkindi.com</a>
          <a href="https://www.alkindi.com" class="contact__link contact__link--sub">www.alkindi.com</a>
        </div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <div class="container footer__inner">
      <small>© <span id="footer-year">2026</span> al-Kindi</small>
      <div class="footer__right">
        <span class="footer__tagline" data-i18n="footer.tagline"></span>
        <span class="footer__credit"><span data-i18n="footer.creditPrefix"></span> <a href="https://munevver.xyz" target="_blank" rel="noopener">Münevver Aslan</a></span>
      </div>
    </div>
  </footer>

  <script src="scripts/site.js" defer></script>
</body>
</html>
